name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  BACKEND_REPO: task-tracker-backend
  FRONTEND_REPO: task-tracker-frontend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore backend dependencies
        run: dotnet restore apps/backend

      - name: Build backend
        run: dotnet build apps/backend --no-restore -c Release

      - name: Restore test project
        run: dotnet restore apps/backend.Tests

      - name: Run backend tests
        run: dotnet test apps/backend.Tests --no-restore --verbosity normal

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: cd apps/frontend && npm run lint

      - name: TypeScript check
        run: cd apps/frontend && npm run typecheck

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Backend image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} \
                       -t $ECR_REGISTRY/$BACKEND_REPO:latest \
                       -f apps/backend/Dockerfile apps/backend
          docker push $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest

      - name: Build and push Frontend image
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} \
                       -t $ECR_REGISTRY/$FRONTEND_REPO:latest \
                       --build-arg BACKEND_API_URL=${{ vars.BACKEND_API_URL }} \
                       -f apps/frontend/Dockerfile apps/frontend
          docker push $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            bash deploy.sh ${{ secrets.AWS_ECR_REGISTRY }} ${{ github.sha }} ${{ secrets.AWS_REGION }}